name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout released commit
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.sha }}

      - name: Login to GHCR
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.release.outputs.tag_name }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.revision=${{ steps.release.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
